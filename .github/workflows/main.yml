name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

env:
  PY_COLORS: "1"

jobs:
  build:

    strategy:
      matrix:
        os: ['ubuntu-latest', 'windows-latest']
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]

    runs-on: ${{ matrix.os }}
    name: OS ${{ matrix.os }}, Python ${{ matrix.python-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run linter/code formatter
        run: uv run poe lint-checkonly

      - name: Run type checks
        run: uv run poe typecheck

      - name: Run pytests
        run: uv run poe test --showlocals --verbose

  create_wheel_and_sdist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync

      - name: Build wheel and sdist
        run: uv build

      - name: Upload wheel and sdist as artifact
        uses: actions/upload-artifact@v7
        with:
          name: Package-Distributions-construct-typing
          path: dist/
